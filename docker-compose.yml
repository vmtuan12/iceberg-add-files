services:
  minio:
    container_name: minio
    hostname: minio
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: root123456
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cdc

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        sleep 5;
        mc alias set local http://minio:9000 root root123456;
        mc mb --ignore-existing local/iceberg;
        echo 'Bucket created';
      "
    networks:
      - cdc

  hive-metastore-db:
    container_name: hive-metastore-db
    hostname: hive-metastore-db
    image: postgres:13
    environment:
      POSTGRES_DB: metastore_db
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore_db"]
      interval: 10s
      timeout: 2s
      retries: 30
    volumes:
      - hms_db_data:/var/lib/postgresql/data
    networks:
      - cdc

  hive-metastore:
    container_name: hive-metastore
    hostname: hive-metastore
    image: apache/hive:3.1.3
    depends_on:
      hive-metastore-db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      HIVE_AUX_JARS_PATH: /opt/hadoop/share/hadoop/tools/lib/hadoop-aws-3.1.0.jar:/opt/hadoop/share/hadoop/tools/lib/aws-java-sdk-bundle-1.11.271.jar
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://hive-metastore-db:5432/metastore_db
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
        -Dhive.metastore.warehouse.dir=s3a://iceberg/warehouse/
    volumes:
      - ./hms/conf/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml:ro
      - ./hms/conf/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
      - ./jars/postgresql-42.7.3.jar:/opt/hive/lib/postgresql-42.7.3.jar:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        # Copy PostgreSQL JDBC driver into Hive lib
        cp /tmp/postgresql-42.7.3.jar /opt/hive/lib/postgresql-42.7.3.jar
        # Start the metastore
        /entrypoint.sh
    networks:
      - cdc

  spark:
    container_name: spark
    hostname: spark
    build:
      dockerfile: Dockerfile.spark
    depends_on:
      hive-metastore:
        condition: service_started
    volumes:
      - .:/app
    networks:
      - cdc
    command: ["/opt/spark/bin/spark-submit", "/app/main.py"]

volumes:
  minio_data:
  hms_db_data:

networks:
  cdc:
    driver: "bridge"
    name: cdcnet
